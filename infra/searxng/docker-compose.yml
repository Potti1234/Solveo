services:
  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: vultr-audit-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SEARXNG_PORT:-8080}:8080"
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_PUBLIC_URL:-http://localhost:${SEARXNG_PORT:-8080}/}
      INSTANCE_NAME: ${SEARXNG_INSTANCE_NAME:-Vultr Audit Search}
      SEARXNG_SECRET_KEY: "${SEARXNG_SECRET_KEY:?Generate one with openssl rand -hex 32}"
    volumes:
      - ./searxng:/etc/searxng:rw
    entrypoint: ["/bin/sh", "/etc/searxng/start.sh"]
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
