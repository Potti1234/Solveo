services:
  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/backend/concierge_court.db
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
